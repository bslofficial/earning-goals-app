<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProEarn Rewards</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="side-menu" class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">$</div>
            <h3>ProEarn</h3>
            <i class="fas fa-times close-btn" onclick="toggleMenu()"></i>
        </div>
        <ul class="menu-list">
            <li><a href="#"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="https://t.me/incomeworld01" target="_blank"><i class="fas fa-headset"></i> Support</a></li>
            <li><a href="#" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </div>

    <div id="loading-screen"><div class="spinner"></div></div>

    <div id="auth-screen" class="auth-wrapper" style="display: none;">
        <div class="auth-card">
            <div class="logo-circle">$</div>
            <h2>ProEarn Login</h2>
            <div class="input-field"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="Email"></div>
            <div class="input-field"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="Password"></div>
            <button id="login-btn" class="main-btn">LOGIN / SIGN UP</button>
        </div>
    </div>

    <div id="main-app" class="app-container" style="display: none;">
        <div class="top-header">
            <div class="header-top-row">
                <i class="fas fa-bars menu-trigger" onclick="toggleMenu()"></i>
                <h2 class="brand">PROEARN</h2>
                <div class="balance-pill">
                    <small>Balance</small>
                    <p>Tk.<span id="balance">0.00</span></p>
                </div>
            </div>
            <div class="user-strip">
                <span id="display-name">User</span>
                <button onclick="openWithdraw()" class="withdraw-btn">Withdraw</button>
            </div>
            <button onclick="claimDailyBonus()" id="bonus-btn" class="daily-bonus-btn">
                <i class="fas fa-gift"></i> <span id="bonus-text">DAILY BONUS</span>
            </button>
        </div>

        <div class="content-body">
            <div class="refer-card">
                <p>Refer & Earn <b>Tk.30.00</b></p>
                <div class="refer-input-group">
                    <input type="text" id="refer-url" readonly>
                    <button onclick="copyReferLink()">COPY</button>
                </div>
            </div>

            <div class="task-grid">
                <div class="task-card" id="card-1" onclick="startVideoTask(1)">
                    <i class="fas fa-play-circle"></i>
                    <span>Task 01</span>
                    <b id="timer-1">Tk.10.00</b>
                </div>
                <div class="task-card" id="card-2" onclick="startVideoTask(2)">
                    <i class="fas fa-play-circle"></i>
                    <span>Task 02</span>
                    <b id="timer-2">Tk.10.00</b>
                </div>
                <div class="task-card" id="card-3" onclick="startVideoTask(3)">
                    <i class="fas fa-play-circle"></i>
                    <span>Task 03</span>
                    <b id="timer-3">Tk.10.00</b>
                </div>
                <div class="task-card" id="card-4" onclick="startVideoTask(4)">
                    <i class="fas fa-play-circle"></i>
                    <span>Task 04</span>
                    <b id="timer-4">Tk.10.00</b>
                </div>
            </div>
        </div>
    </div>

    <div id="withdrawModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Withdraw Funds</h3>
            <select id="method"><option>Bkash</option><option>Nagad</option></select>
            <input type="text" id="accountNo" placeholder="Account Number">
            <input type="number" id="withdrawAmount" placeholder="Min Tk.500">
            <button class="main-btn" onclick="sendWithdrawRequest()">CONFIRM</button>
            <p onclick="closeWithdraw()" class="close-modal">Close</p>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
