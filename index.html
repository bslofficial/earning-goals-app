<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProEarn - Digital Rewards</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p>Dashboard Updating...</p>
    </div>

    <div id="main-app" class="app-container" style="display: none;">
        <header class="minimal-header">
            <div class="header-top">
                <span class="brand-name">PROEARN</span>
                <span id="user-display-name">User</span>
            </div>
            <div class="balance-card">
                <small>Available Balance</small>
                <h1>Tk. <span id="balance">0.00</span></h1>
            </div>
        </header>

        <main class="main-content">
            <div class="stats-grid">
                <div class="stat-box"><small>Total Task</small><br><b id="tasks-done">0</b></div>
                <div class="stat-box"><small>Referral</small><br><b>0</b></div>
            </div>

            <div class="menu-container">
                <button class="main-menu-btn" onclick="toggleSubMenu('social-links')">
                    <span><i class="fas fa-share-alt"></i> Social Media Links</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div id="social-links" class="sub-menu">
                    <a href="https://youtube.com/@bslgaimer5563?si=jcPd-re749w2V5a1" target="_blank" class="sub-btn yt" onclick="handleReward(2)"><i class="fab fa-youtube"></i> YouTube Channel</a>
                    <a href="https://www.facebook.com/bsl.gaimer/" target="_blank" class="sub-btn fb" onclick="handleReward(1)"><i class="fab fa-facebook"></i> Facebook Page</a>
                    <a href="https://instagram.com" target="_blank" class="sub-btn ig" onclick="handleReward(1)"><i class="fab fa-instagram"></i> Instagram Follow</a>
                </div>
            </div>

            <div class="menu-container">
                <button class="main-menu-btn" onclick="toggleSubMenu('ad-tasks')">
                    <span><i class="fas fa-bolt"></i> Extra Earning Tasks</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div id="ad-tasks" class="sub-menu">
                    <a href="https://glamourpicklessteward.com/mur0zqw1i?key=1357f8fdd3f1c4497af9b8581d8ad6cb" target="_blank" class="sub-btn ad" onclick="handleReward(5)">
                        <i class="fas fa-ad"></i> High Reward Ad 01
                    </a>
                    <a href="https://glamourpicklessteward.com/mur0zqw1i?key=1357f8fdd3f1c4497af9b8581d8ad6cb" target="_blank" class="sub-btn survey" onclick="handleReward(10)">
                        <i class="fas fa-poll-h"></i> Daily Special Offer
                    </a>
                </div>
            </div>

            <div class="action-footer">
                <button onclick="handleLogout()" class="btn-logout">Logout</button>
                <button onclick="alert('Withdraw logic coming soon!')" class="btn-withdraw">Withdraw</button>
            </div>
        </main>
    </div>

    <div id="auth-screen" class="auth-wrapper" style="display: none;">
        <div class="auth-card">
            <div class="app-logo">P</div>
            <h2>Login</h2>
            <div class="input-field"><input type="email" id="email" placeholder="Email Address"></div>
            <div class="input-field"><input type="password" id="password" placeholder="Password"></div>
            <button id="login-btn" class="main-btn-min">Continue</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
