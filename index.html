<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProEarn Rewards</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="main-app" class="app-container">
        <div class="top-nav-blue">
            <div class="nav-header">
                <i class="fas fa-bars menu-trigger" onclick="toggleMenu()"></i>
                <h1 class="app-title-header">PROEARN REWARDS</h1>
            </div>
            <div class="user-row">
                <div class="balance-box">
                    <small>Balance</small>
                    <h2>Tk.<span id="balance">360.00</span></h2>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="action-buttons">
                <button onclick="claimDailyBonus()" id="bonus-btn" class="btn-bonus">
                    <i class="fas fa-gift"></i> Daily Bonus
                </button>
                <button onclick="openWithdraw()" class="btn-withdraw">
                    <i class="fas fa-wallet"></i> Withdraw
                </button>
            </div>

            <div class="grid-container">
                <div class="custom-card task-card" onclick="goToIncomePage()">
                    <i class="fas fa-play"></i>
                    <p>Task 01</p>
                    <h3>Tk.05.00</h3>
                </div>
                <div class="custom-card task-card" onclick="goToIncomePage()">
                    <i class="fas fa-play"></i>
                    <p>Task 02</p>
                    <h3>Tk.05.00</h3>
                </div>
                <div class="custom-card task-card" onclick="goToIncomePage()">
                    <i class="fas fa-play"></i>
                    <p>Task 03</p>
                    <h3>Tk.05.00</h3>
                </div>
                <div class="custom-card task-card" onclick="goToIncomePage()">
                    <i class="fas fa-play"></i>
                    <p>Task 04</p>
                    <h3>Tk.05.00</h3>
                </div>
            </div>

            </div>
    </div>

    <script type="module" src="script.js"></script>
    <script>
        function goToIncomePage() {
            window.location.href = "income.html";
        }
        
        function toggleMenu() {
            // আপনার মেনু টগল লজিক এখানে থাকবে
            console.log("Menu toggled");
        }
    </script>
</body>
</html>
