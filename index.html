<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProEarn Rewards</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="side-menu" class="sidebar">
        <div class="sidebar-user">
            <div class="mini-avatar">P</div>
            <h3>ProEarn Menu</h3>
        </div>
        <ul class="menu-list">
            <li><a href="#" onclick="showSection('dashboard')"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a href="#" onclick="showSection('leaderboard')"><i class="fas fa-medal"></i> Leaderboard</a></li>
            <li><a href="#" onclick="showSection('refer-team')"><i class="fas fa-user-friends"></i> Refer Team</a></li>
            <li><a href="#" onclick="showSection('history')"><i class="fas fa-wallet"></i> History</a></li>
            <hr>
            <li><a href="#" onclick="handleLogout()"><i class="fas fa-power-off"></i> Logout</a></li>
        </ul>
    </div>

    <div id="loading-screen">
        <div class="spinner"></div>
    </div>

    <div id="auth-screen" class="auth-wrapper" style="display: none;">
        <div class="auth-card">
            <h2 class="minimal-brand">PROEARN</h2>
            <p>Welcome back! Please login.</p>
            <input type="email" id="email" class="min-input" placeholder="Email">
            <input type="password" id="password" class="min-input" placeholder="Password">
            <button id="login-btn" class="min-btn">Continue</button>
        </div>
    </div>

    <div id="main-app" class="app-container" style="display: none;">
        <header class="minimal-header">
            <div class="header-top">
                <i class="fas fa-align-left" onclick="toggleMenu()"></i>
                <span class="brand-text">PROEARN</span>
                <i class="far fa-bell"></i>
            </div>
            <div class="balance-card">
                <p>Available Balance</p>
                <h1>Tk. <span id="balance">0.00</span></h1>
            </div>
        </header>

        <div id="dashboard-section" class="main-content">
            <div class="quick-stats">
                <div class="stat-item">
                    <small>Total Refer</small>
                    <b id="refer-count">0</b>
                </div>
                <div class="stat-item">
                    <small>Tasks Done</small>
                    <b id="tasks-done">0</b>
                </div>
            </div>

            <h3 class="section-label">Earning Tasks</h3>
            <div class="task-grid">
                <div class="soft-card" onclick="startVideoTask(1)">
                    <div class="icon-circle red-tint"><i class="fas fa-play"></i></div>
                    <div class="task-info">
                        <span>Task 01</span>
                        <small id="timer-1">Tk.10.00</small>
                    </div>
                </div>
                <div class="soft-card" onclick="startVideoTask(2)">
                    <div class="icon-circle red-tint"><i class="fas fa-play"></i></div>
                    <div class="task-info">
                        <span>Task 02</span>
                        <small id="timer-2">Tk.10.00</small>
                    </div>
                </div>
                <div class="soft-card" onclick="startVideoTask(3)">
                    <div class="icon-circle red-tint"><i class="fas fa-play"></i></div>
                    <div class="task-info">
                        <span>Task 03</span>
                        <small id="timer-3">Tk.10.00</small>
                    </div>
                </div>
                <div class="soft-card" onclick="startVideoTask(4)">
                    <div class="icon-circle red-tint"><i class="fas fa-play"></i></div>
                    <div class="task-info">
                        <span>Task 04</span>
                        <small id="timer-4">Tk.10.00</small>
                    </div>
                </div>
            </div>

            <div class="bottom-actions">
                <button onclick="claimDailyBonus()" class="bonus-min">Daily Bonus</button>
                <button onclick="openWithdraw()" class="withdraw-min">Withdraw</button>
            </div>
        </div>

        <div id="other-section" class="main-content" style="display: none;">
            <div class="detail-container">
                <button onclick="showSection('dashboard')" class="back-link"><i class="fas fa-chevron-left"></i> Back</button>
                <h2 id="section-title">Details</h2>
                <div id="section-details" class="details-content"></div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
