<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProEarn Rewards</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="side-menu" class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">$</div>
            <h3>ProEarn Menu</h3>
            <i class="fas fa-times close-btn" onclick="toggleMenu()"></i>
        </div>
        <ul class="menu-list">
            <li><a href="index.html"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="#"><i class="fas fa-history"></i> Payment History</a></li>
            <li><a href="https://t.me/incomeworld01" target="_blank"><i class="fas fa-headset"></i> Support</a></li>
            <hr style="border: 0.5px solid #2d3748; margin: 10px 0;">
            <li><a href="#" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </div>

    <div id="loading-screen"><div class="spinner"></div></div>

    <div id="auth-screen" class="auth-wrapper">
        <div class="auth-card">
            <div class="sidebar-logo" style="margin-bottom: 20px;">$</div>
            <h2>ProEarn Login</h2>
            <div class="input-field"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="Email Address"></div>
            <div class="input-field"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="Password"></div>
            <button id="login-btn" class="main-btn">Login / Sign Up</button>
        </div>
    </div>

    <div id="main-app" class="app-container" style="display: none;">
        <div class="top-nav-blue">
            <div class="nav-header">
                <i class="fas fa-bars menu-trigger" onclick="toggleMenu()"></i>
                <h1 class="app-title-header">PROEARN</h1>
                <div class="balance-box">
                    <small>Balance</small>
                    <h2>Tk.<span id="balance">0.00</span></h2>
                </div>
            </div>
            <div class="user-row">
                <span id="display-name">User</span>
                <button onclick="openWithdraw()" class="btn-withdraw" style="padding: 5px 15px; font-size: 12px;">Withdraw</button>
            </div>
        </div>

        <div class="main-content">
            <div class="refer-info">
                <p>Refer & Earn <b>Tk.30.00</b></p>
                <div class="refer-link-box">
                    <input type="text" id="refer-url" readonly>
                    <button onclick="copyReferLink()" class="share-btn">Copy</button>
                </div>
            </div>

            <div class="grid-container">
                <div class="custom-card task-card" id="card-1" onclick="startVideoTask(1)">
                    <i class="fas fa-play"></i><p>Task 01</p><h3 id="timer-1">Tk.10.00</h3>
                </div>
                <div class="custom-card task-card" id="card-2" onclick="startVideoTask(2)">
                    <i class="fas fa-play"></i><p>Task 02</p><h3 id="timer-2">Tk.10.00</h3>
                </div>
                <div class="custom-card task-card" id="card-3" onclick="startVideoTask(3)">
                    <i class="fas fa-play"></i><p>Task 03</p><h3 id="timer-3">Tk.10.00</h3>
                </div>
                <div class="custom-card task-card" id="card-4" onclick="startVideoTask(4)">
                    <i class="fas fa-play"></i><p>Task 04</p><h3 id="timer-4">Tk.10.00</h3>
                </div>
            </div>
        </div>
    </div>

    <div id="withdrawModal" class="modal-backdrop">
        <div class="modal-box">
            <h3>Withdraw Funds</h3>
            <select id="method"><option value="Bkash">Bkash</option><option value="Nagad">Nagad</option></select>
            <input type="text" id="accountNo" placeholder="Account Number">
            <input type="number" id="withdrawAmount" placeholder="Min Tk.500">
            <button class="submit-btn" onclick="sendWithdrawRequest()">Confirm</button>
            <p onclick="closeWithdraw()" style="margin-top:10px; cursor:pointer; opacity:0.6;">Close</p>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
