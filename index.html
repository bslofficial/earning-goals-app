<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Rewards</title>
    <link rel="stylesheet" href="style.css?v=1.3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="loading-screen" class="loader-overlay">
        <div class="spinner"></div>
        <p>Syncing Data...</p>
    </div>

    <div id="side-menu" class="sidebar">
        <div class="sidebar-header"><h3>MENU</h3><i class="fas fa-times" onclick="toggleSidebar()"></i></div>
        <ul>
            <li onclick="location.href='index.html'"><i class="fas fa-home"></i> Home</li>
            <li onclick="location.href='profile.html'"><i class="fas fa-user"></i> Profile</li>
            <li onclick="location.href='refer.html'"><i class="fas fa-users"></i> Refer & Earn</li>
            <li onclick="location.href='leaderboard.html'"><i class="fas fa-trophy"></i> Leaderboard</li>
            <li onclick="location.href='history.html'"><i class="fas fa-history"></i> History</li>
            <li onclick="location.href='privacy.html'"><i class="fas fa-shield-alt"></i> Privacy</li>
        </ul>
    </div>

    <div id="main-app" style="display:none;">
        <div class="top-nav">
            <div class="nav-header">
                <i class="fas fa-bars" onclick="toggleSidebar()"></i>
                <h1>PRO REWARDS</h1>
            </div>
            <div class="balance-card">
                <p>Available Balance</p>
                <h2>Tk.<span id="balance">0.00</span></h2>
            </div>
        </div>

        <div class="container">
            <div class="action-row">
                <button class="btn-bonus" onclick="claimDailyBonus()"><i class="fas fa-gift"></i> Daily Bonus (Tk.5)</button>
                <button class="btn-withdraw" onclick="location.href='withdraw.html'"><i class="fas fa-wallet"></i> Withdraw</button>
            </div>

            <div class="task-grid">
                <div class="task-card" onclick="startTask(1)">
                    <div class="icon-bg"><i class="fas fa-play"></i></div>
                    <p>Task 01</p><h3>Tk.0.50</h3>
                </div>
                <div class="task-card" onclick="startTask(2)">
                    <div class="icon-bg"><i class="fas fa-play"></i></div>
                    <p>Task 02</p><h3>Tk.0.50</h3>
                </div>
                <div class="task-card" onclick="startTask(3)">
                    <div class="icon-bg"><i class="fas fa-play"></i></div>
                    <p>Task 03</p><h3>Tk.0.50</h3>
                </div>
                <div class="task-card" onclick="startTask(4)">
                    <div class="icon-bg"><i class="fas fa-play"></i></div>
                    <p>Task 04</p><h3>Tk.0.50</h3>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="script.js?v=1.3"></script>
</body>
</html>
