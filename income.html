<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Processing</title>
    <style>
        body { background: #FFC0CB; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .box { background: white; padding: 30px; border-radius: 20px; width: 80%; }
        #timer { font-size: 24px; font-weight: bold; margin: 20px 0; display: none; }
        .btn { padding: 15px 30px; background: #3b82f6; color: white; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>টাস্ক রুলস</h2>
        <p>নিচের বাটনে ক্লিক করে ১৯ সেকেন্ড অপেক্ষা করুন।</p>
        <button id="start-btn" class="btn" onclick="runTask()">টাস্ক শুরু করুন</button>
        <div id="timer">19 সেকেন্ড অপেক্ষা করুন</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDuLLapNwRk2Fl5rN6F0ezZb9KsMBKhvqA",
            authDomain: "earning-goals-app.firebaseapp.com",
            projectId: "earning-goals-app",
            databaseURL: "https://earning-goals-app-default-rtdb.firebaseio.com",
            storageBucket: "earning-goals-app.firebasestorage.app",
            messagingSenderId: "999611133128",
            appId: "1:999611133128:web:f8bd2cb60ac5a07b1249fd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let user = null;
        onAuthStateChanged(auth, (u) => { user = u; if(!u) window.location.href="index.html"; });

        window.runTask = () => {
            window.open("https://glamourpicklessteward.com/mur0zqw1i?key=1357f8fdd3f1c4497af9b8581d8ad6cb", "_blank");
            document.getElementById('start-btn').style.display = 'none';
            const tDiv = document.getElementById('timer');
            tDiv.style.display = 'block';
            let sec = 19;
            const itv = setInterval(async () => {
                sec--;
                tDiv.innerText = sec + " সেকেন্ড অপেক্ষা করুন";
                if(sec <= 0) {
                    clearInterval(itv);
                    const userRef = ref(db, 'users/' + user.uid);
                    const snap = await get(userRef);
                    const bal = (snap.val().balance || 0) + 5;
                    await update(userRef, { balance: bal });
                    alert("Tk.5 Added!");
                    window.location.href = "index.html";
                }
            }, 1000);
        };
    </script>
</body>
</html>
